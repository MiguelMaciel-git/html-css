<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos com HTML5</title>
</head>
<body>
    <h1>Inserindo videos  hospedados localmente</h1>
    <p>Este video esta hospedado no meu proprio servidor.</p>
    <video width="560" controls autoplay loop>
        <source src="midia/meuvideohp.mp4" type="video/mp4">
        <source src="midia/meu-videowebm.webm" type="video/webm">
        <source src="midia/meuvideohpogv.ogv" type="video/ogg">
        <p>seu navegador nao tem  compatibilidade com reproducao de video</p>
    </video>

    <H1>Inserindo videos do youtube</H1>

    <iframe width="560" height="315" src="https://www.youtube.com/embed/eGUor824a74?si=dD3yl1fUoj1KIfY7" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    <h1>Inserindo video do vimeo </h1>

    <div style="padding:56.25% 0 0 0;position:relative;"><iframe src="https://player.vimeo.com/video/1189984971?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479" frameborder="0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" referrerpolicy="strict-origin-when-cross-origin" style="position:absolute;top:0;left:0;width:100%;height:100%;" title="How Was Your Weekend?"></iframe></div><script src="https://player.vimeo.com/api/player.js"></script>
</body>
</html>
