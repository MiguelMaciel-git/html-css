<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praticando</title>
    <style>
        div > p {
            display: none;
        }

        div:hover > p {
            display: block;
            background-color: red;
            width: 250px;
        }
    </style>
</head>
<body>
    <h1>Conteudo Especial</h1>
    <div>
        Passe o mouse aqui
        <p>SUPRESAAAAAAA!</p>
    </div>
    <p>Veja o conteudo aparecendo!</p>
</body>
</html>
